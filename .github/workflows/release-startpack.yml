# Release start packs (WP-U62)
#
# Notario → tarball + acta → GitHub Release espejo.
# Publish npm opcional con D-24 (a): secrets NPM_USERNAME + NPM_PASSWORD
# (_password base64). Vía canónica: scripts/notario-release.mjs.
# Lote mesh ciudad (kit + startpack + game): ver publish-mesh-ciudad.yml.

name: Release startpack

on:
  workflow_dispatch:
    inputs:
      game:
        description: 'Game id (delta|pozo|plaza|ciudad|…)'
        required: true
        default: 'delta'
        type: choice
        options:
          - delta
          - pozo
          - plaza
          - sketch
          - solve-coagula
          - ciudad
      publish_npm:
        description: 'Also npm publish (needs NPM_USERNAME/PASSWORD)'
        required: false
        default: false
        type: boolean
  push:
    tags:
      - 'startpack-*-v*'

concurrency:
  group: release-startpack-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: notario + GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      # Sin registry-url: evita bearer JWT; auth write = basic-auth abajo.
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Detect publish credentials
        id: creds
        env:
          NPM_USERNAME: ${{ secrets.NPM_USERNAME }}
          NPM_PASSWORD: ${{ secrets.NPM_PASSWORD }}
        run: |
          if [ -n "${NPM_USERNAME}" ] && [ -n "${NPM_PASSWORD}" ]; then
            echo "has_npm=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_npm=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Configure registry basic-auth (_password)
        if: steps.creds.outputs.has_npm == 'true'
        env:
          NPM_USERNAME: ${{ secrets.NPM_USERNAME }}
          NPM_PASSWORD: ${{ secrets.NPM_PASSWORD }}
        run: |
          HOST='npm.scriptorium.escrivivir.co'
          {
            echo "@zeus:registry=https://${HOST}"
            echo "@alephscript:registry=https://${HOST}"
            echo "//${HOST}/:username=${NPM_USERNAME}"
            echo "//${HOST}/:_password=${NPM_PASSWORD}"
            echo "//${HOST}/:email=ci@scriptorium.escrivivir.co"
            echo "//${HOST}/:always-auth=true"
          } >> .npmrc
      - name: Install (@zeus desde registry)
        run: npm install
      - name: Link Z_SDK (fallback DEV si el notario lo necesita)
        env:
          CI: 'true'
          ZEUS_SDK_REF: main
        run: npm run setup:zeus-sdk
        continue-on-error: true
      - name: Resolve game
        id: game
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "game=${{ inputs.game }}" >> "$GITHUB_OUTPUT"
          else
            # tag startpack-delta-v0.1.0 → delta
            g=$(echo "${{ github.ref_name }}" | sed -E 's/^startpack-([a-z0-9]+)-v.*/\1/')
            echo "game=$g" >> "$GITHUB_OUTPUT"
          fi
      - name: Notario pack + GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          NPM_USERNAME: ${{ secrets.NPM_USERNAME }}
          NPM_PASSWORD: ${{ secrets.NPM_PASSWORD }}
        run: |
          EXTRA=()
          EXTRA+=(--publish-github)
          if [[ "${{ inputs.publish_npm }}" == "true" ]] || [[ "${{ steps.creds.outputs.has_npm }}" == "true" && "${{ github.event_name }}" == "push" ]]; then
            EXTRA+=(--publish-npm)
          fi
          node scripts/notario-release.mjs --game "${{ steps.game.outputs.game }}" "${EXTRA[@]}"
      - name: Upload local artifacts
        uses: actions/upload-artifact@v4
        with:
          name: startpack-${{ steps.game.outputs.game }}
          path: .release-startpack/
          # OUT_DIR is dot-prefixed (.release-startpack); v4 hides those by default.
          include-hidden-files: true
          # Soft-miss was masking a broken upload while the job stayed green.
          if-no-files-found: error
