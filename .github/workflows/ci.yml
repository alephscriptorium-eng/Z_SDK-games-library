# CI Z_SDK-games-library (WP-U123): install desde registry + unit tests.
# setup:zeus-sdk queda como fallback DEV para resolveZeusSdkRoot en tests
# que tocan mesh paths (no es puente file: de npm).
name: CI

on:
  push:
    branches:
      - main
      - 'wp/**'
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: install + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install (@zeus desde registry)
        run: npm install
      - name: Link Z_SDK (fallback DEV · resolveZeusSdkRoot)
        env:
          CI: 'true'
          ZEUS_SDK_REF: main
        run: npm run setup:zeus-sdk
      - name: Test
        run: npm test
