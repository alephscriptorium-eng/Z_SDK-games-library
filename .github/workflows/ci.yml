# CI mínima Z_SDK-games-library (WP-U60): install + tests (smoke scaffold).
name: CI

on:
  push:
    branches:
      - main
      - 'wp/**'
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: install + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install
        run: npm ci
      - name: Test
        run: npm test
