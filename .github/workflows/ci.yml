# CI Z_SDK-games-library (WP-U61): setup Z_SDK file: + unit tests.
name: CI

on:
  push:
    branches:
      - main
      - 'wp/**'
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: install + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Link / clone Z_SDK (.deps file:)
        env:
          CI: 'true'
          ZEUS_SDK_REF: main
        run: npm run setup:zeus-sdk
      - name: Install
        run: npm install
      - name: Test
        run: npm test
